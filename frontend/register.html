<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register — DeadlineShield</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Poppins", sans-serif;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                color: #fff;
            }

            .register-container {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                padding: 50px;
                width: 100%;
                max-width: 400px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            }

            .logo {
                text-align: center;
                margin-bottom: 30px;
                font-size: 40px;
            }

            h1 {
                font-family: "Orbitron", sans-serif;
                font-size: 28px;
                text-align: center;
                margin-bottom: 10px;
                letter-spacing: 2px;
            }

            .subtitle {
                text-align: center;
                color: #aaa;
                font-size: 14px;
                margin-bottom: 30px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            label {
                display: block;
                margin-bottom: 8px;
                font-weight: 500;
                color: #e0e0e0;
            }

            input {
                width: 100%;
                padding: 12px 15px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: rgba(255, 255, 255, 0.05);
                border-radius: 8px;
                color: #fff;
                font-family: "Poppins", sans-serif;
                transition: all 0.3s ease;
            }

            input:focus {
                outline: none;
                border-color: #3ea6fb;
                background: rgba(62, 166, 251, 0.1);
                box-shadow: 0 0 10px rgba(62, 166, 251, 0.3);
            }

            input::placeholder {
                color: #888;
            }

            .register-btn {
                width: 100%;
                padding: 12px;
                background: linear-gradient(135deg, #3ea6fb 0%, #2a7bc5 100%);
                border: none;
                border-radius: 8px;
                color: white;
                font-weight: 600;
                font-size: 16px;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-top: 10px;
            }

            .register-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(62, 166, 251, 0.4);
            }

            .login-link {
                text-align: center;
                margin-top: 20px;
                font-size: 14px;
                color: #aaa;
            }

            .login-link a {
                color: #3ea6fb;
                text-decoration: none;
                font-weight: 600;
                transition: color 0.3s ease;
            }

            .login-link a:hover {
                color: #5bb3ff;
                text-decoration: underline;
            }

            .error-message {
                color: #ff6b6b;
                font-size: 13px;
                margin-top: 5px;
                display: none;
            }

            .loading {
                display: none;
                text-align: center;
                color: #3ea6fb;
                font-size: 14px;
            }
        </style>
    </head>
    <body>
        <div class="register-container">
            <div class="logo">⏰</div>
            <h1>DeadlineShield</h1>
            <p class="subtitle">Create your account</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="John Doe"
                        required
                    />
                    <div class="error-message" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="your@email.com"
                        required
                    />
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone (Optional)</label>
                    <input
                        type="tel"
                        id="phone"
                        placeholder="+1 (555) 123-4567"
                    />
                    <div class="error-message" id="phoneError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Create a strong password"
                        required
                    />
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm your password"
                        required
                    />
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <div class="form-group">
                    <label for="role">Designation</label>
                    <select id="role" required>
                        <option value="">Select designation</option>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="admin">Admin</option>
                        <option value="other">Other</option>
                    </select>
                    <div class="error-message" id="roleError"></div>
                </div>
                <div class="loading" id="loading">Registering...</div>
                <div class="error-message" id="generalError"></div>

                <button type="submit" class="register-btn">Register</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>

        <script>
            const API_BASE_URL = "http://localhost:5000/api";

            const registerForm = document.getElementById("registerForm");
            registerForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const name = document.getElementById("name").value;
                const email = document.getElementById("email").value;
                const phone = document.getElementById("phone").value;
                const password = document.getElementById("password").value;
                const confirmPassword =
                    document.getElementById("confirmPassword").value;

                const role = document.getElementById("role").value;
                const loading = document.getElementById("loading");
                const generalError = document.getElementById("generalError");
                const confirmPasswordError = document.getElementById("confirmPasswordError");
                const roleError = document.getElementById("roleError");


                // Validate passwords match
                if (password !== confirmPassword) {
                    confirmPasswordError.textContent = "Passwords do not match";
                    confirmPasswordError.style.display = "block";
                    return;
                } else {
                    confirmPasswordError.style.display = "none";
                }

                // Validate role
                if (!role) {
                    roleError.textContent = "Please select a designation.";
                    roleError.style.display = "block";
                    return;
                } else {
                    roleError.style.display = "none";
                }

                loading.style.display = "block";
                generalError.style.display = "none";

                try {
                    const response = await fetch(
                        `${API_BASE_URL}/auth/register`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                name,
                                email,
                                password,
                                phone: phone || null,
                                role,
                            }),
                        },
                    );

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || "Registration failed");
                    }

                    // Store user for OTP page (no token yet — verification required)
                    localStorage.setItem("user", JSON.stringify(data.user));

                    // Redirect to OTP verification
                    window.location.href = "otp_verification.html";
                } catch (error) {
                    generalError.textContent = error.message;
                    generalError.style.display = "block";
                } finally {
                    loading.style.display = "none";
                }
            });
        </script>
    </body>
</html>
